apiVersion: skaffold/v4beta11
kind: Config

metadata:
  name: jeffrey-epstein-files

build:
  artifacts:
  - image: rinavillaruz/jeffrey-epstein-files-fetcher
    docker:
      dockerfile: build/Dockerfile.dev
      target: data-fetcher
    sync:
      manual:
      - src: 'scripts/**/*.py'
        dest: /app # was /app/scripts, caused double scripts/scripts

  local:
    push: false
    useBuildkit: true
    useDockerCLI: true

deploy:
  statusCheckDeadlineSeconds: 300
  kubectl:
    defaultNamespace: data-dev

manifests:
  rawYaml:
  - k8s/dev-tools/fetcher-dev.yaml