{{- if .Values.mlTrainer.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.mlTrainer.name }}-{{ now | date "20060102-150405" }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.mlTrainer.name }}
    component: ml-pipeline
    step: train
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ .Values.mlTrainer.name }}
        component: ml-pipeline
        step: train
    spec:
      restartPolicy: OnFailure
      containers:
        - name: trainer
          image: {{ .Values.image.registry }}/{{ .Values.image.repository }}/{{ .Values.mlTrainer.image.name }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: 
            - /bin/bash
            - -c
            - |
              echo "========================================="
              echo "TRAINING MODEL"
              echo "========================================="
              cd /app
              python scripts/train_model.py
              
              echo ""
              echo "✅ Model trained and saved to /models/"
              ls -lh /models/
          resources:
            {{- toYaml .Values.mlTrainer.resources | nindent 12 }}
          {{- if .Values.mlTrainer.persistence.enabled }}
          volumeMounts:
            - name: training-data
              mountPath: /data/ml-training
              readOnly: true
            - name: models
              mountPath: /models
          {{- end }}
      {{- if .Values.mlTrainer.persistence.enabled }}
      volumes:
        - name: training-data
          persistentVolumeClaim:
            claimName: {{ .Values.mlTrainer.name }}-training-data
        - name: models
          persistentVolumeClaim:
            claimName: {{ .Values.mlTrainer.name }}-models
      {{- end }}
{{- end }}