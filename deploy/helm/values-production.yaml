# Production environment configuration

# ==============================================================================
# GLOBAL SETTINGS
# ==============================================================================
global:
  environment: production
  namespace: data-production
  imageTag: production-latest

# ==============================================================================
# STORAGE SETTINGS
# ==============================================================================
storage:
  createStorageClass: false
  storageClassName: standard  # Use premium-rwo or fast-ssd in real production

# ==============================================================================
# IMAGE SETTINGS
# ==============================================================================
image:
  registry: docker.io
  repository: rinavillaruz
  tag: "production-latest"
  pullPolicy: "Always"

# ==============================================================================
# MONGODB - Production scale
# ==============================================================================
mongodb:
  enabled: true
  replicas: 3
  image: mongo:7.0
  port: 27017
  database: jeffrey_epstein_files
  # Credentials created by deploy-with-helm.sh from .env file
  secret:
    name: mongodb-secret
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      memory: "4Gi"
      cpu: "2000m"
    limits:
      memory: "8Gi"
      cpu: "4000m"

# ==============================================================================
# REDIS - Production scale
# ==============================================================================
redis:
  enabled: true
  replicas: 2
  image: redis:7.2-alpine
  port: 6379
  # Password created by deploy-with-helm.sh from .env file
  secret:
    name: redis-secret
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# ==============================================================================
# DATA FETCHER
# ==============================================================================
dataFetcher:
  enabled: true
  name: jeffrey-epstein-files-fetcher
  schedule: "0 */4 * * *"  # Every 4 hours in production
  replicas: 3
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# ==============================================================================
# ML TRAINER
# ==============================================================================
mlTrainer:
  enabled: true
  replicas: 2
  name: jeffrey-epstein-files-trainer
  epochs: 100  # More epochs in production
  batchSize: 64
  persistence:
    enabled: true
    size: 200Gi
  resources:
    requests:
      memory: "8Gi"
      cpu: "4000m"
    limits:
      memory: "16Gi"
      cpu: "8000m"

# ==============================================================================
# API SERVICE
# ==============================================================================
api:
  enabled: true
  replicas: 5
  name: jeffrey-epstein-files-api
  port: 8000
  service:
    name: jeffrey-epstein-files-api-service
    type: LoadBalancer  # For external access in production
    port: 8000
  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

# ==============================================================================
# JUPYTER NOTEBOOK - Disabled in production
# ==============================================================================
jupyter:
  enabled: false  # NEVER enable in production
  name: jupyter
  namespace: data-production
  replicas: 1
  
  image:
    repository: rinavillaruz/jeffrey-epstein-files-jupyter
    tag: latest
    pullPolicy: Always
  
  service:
    name: jupyter
    type: ClusterIP
    port: 8888
  
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  
  persistence:
    enabled: true
    size: 10Gi
  
  env: []
  volumeMounts: []
  volumes: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  livenessProbe: {}
  readinessProbe: {}

# ==============================================================================
# DEVELOPMENT POD
# ==============================================================================
devPod:
  enabled: false  # NEVER enable in production

# ==============================================================================
# AUTOSCALING
# ==============================================================================
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# ==============================================================================
# LOGGING
# ==============================================================================
logLevel: WARNING

# ==============================================================================
# FEATURES
# ==============================================================================
features:
  metrics: true
  tracing: true