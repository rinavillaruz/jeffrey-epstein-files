apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jeffrey-epstein-files-dev
  namespace: argocd
  # Finalizer ensures proper cleanup
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Project name (default is fine for now)
  project: default
  
  # Source: Where your Helm chart lives
  source:
    repoURL: https://github.com/rinavillaruz/jeffrey-epstein-files
    targetRevision: main
    path: deploy/helm
    
    # Helm-specific configuration
    helm:
      valueFiles:
        - values-dev.yaml
  
  # Destination: Where to deploy
  destination:
    # Deploy to the same cluster ArgoCD is running in
    server: https://kubernetes.default.svc
    # Target namespace - CHANGED from 'data' to 'data-dev'
    namespace: data-dev
  
  # Sync policy: How ArgoCD should manage the app
  syncPolicy:
    # Create namespace if it doesn't exist
    syncOptions:
      - CreateNamespace=true
    
    # Automated sync (GitOps magic)
    automated:
      # Automatically sync when Git changes
      selfHeal: true
      # Delete resources that are removed from Git
      prune: true
    
    # Retry configuration
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m